services:
  app:
    build: .
    ports:
      - "6320:6320"
    environment:
      - JAVA_OPTS=-Xmx512m
      - API_KEY=${API_KEY:-}
    volumes:
      - entry_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6320/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped

volumes:
  entry_data:
    driver: local